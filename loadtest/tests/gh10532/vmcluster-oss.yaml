apiVersion: operator.victoriametrics.com/v1beta1
kind: VMCluster
metadata:
  name: gh10532
  namespace: gh10532
spec:
  retentionPeriod: "60"
  replicationFactor: 1
  clusterVersion: "v1.137.0-cluster"
  vminsert:
    replicaCount: 5
    image:
      pullPolicy: Always
    resources:
      requests:
        cpu: "1"
        memory: 1Gi
      limits:
        cpu: "1"
        memory: 1Gi
  vmselect:
    replicaCount: 10
    image:
      pullPolicy: "Always"
    resources:
      requests:
        cpu: "2"
        memory: 8Gi
      limits:
        cpu: "2"
        memory: 8Gi
  vmstorage:
    replicaCount: 2
    rollingUpdateStrategyBehavior:
      maxUnavailable: 100%
    image:
      pullPolicy: Always
    resources:
      requests:
        cpu: "5"
        memory: 20Gi
      limits:
        cpu: "5"
        memory: 20Gi
    storage:
      volumeClaimTemplate:
        spec:
          resources:
            requests:
              storage: 500Gi
          storageClassName: standard-rwo
  requestsLoadBalancer:
    enabled: true
    spec:
      image:
        pullPolicy: "Always"
        tag: "v1.137.0"
