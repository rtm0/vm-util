        - name: queries-04-10000-4000
          configMap:
            name: queries-04-10000-4000
        - name: queries-05-10000-4000
          configMap:
            name: queries-05-10000-4000
        - name: queries-06-10000-4000-100
          configMap:
            name: queries-06-10000-4000-100
